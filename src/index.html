<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: radial-gradient(ellipse at 50% 60%, #0d1a2e 0%, #060b12 45%, #030508 100%);
      background-attachment: fixed;
    }

    /* Subtle ambient glow layers */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, rgba(0,80,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(100,0,255,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 100% 60% at 50% 100%, rgba(0,200,150,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    #webgl {
      pointer-events: none;
    }

    #ui-app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #ui {
      position: absolute;
      overflow: hidden;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #monitor-videos {
      pointer-events: none;
      position: 'absolute';
      opacity: 0;
      width: 0;
      height: 0;
      top: 0;
      left: 0;

    }

    #css {
      cursor: pointer;
    }

    #ui-interactive {
      position: absolute;
      top: 0;
      left: 0;
      width: 256px;
    }

    /* Mobile responsive fixes */
    @media only screen and (max-width: 768px) {
      #ui-interactive {
        width: 100%;
      }

      #switch-view {
        bottom: 16px;
        right: 12px;
        padding: 8px 14px;
        font-size: 11px;
        gap: 6px;
      }
    }

    video {
      position: absolute;
      top: 0;
      pointer-events: none;
    }

    /* Switch view button */
    #switch-view {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 9999;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: rgba(5,10,7,0.85);
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 50px;
      color: rgba(0,255,136,0.8);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 12px;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.2s;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    #switch-view:hover {
      background: rgba(5,15,10,0.95);
      border-color: rgba(0,255,136,0.6);
      color: #00ff88;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 20px rgba(0,255,136,0.1);
    }
  </style>
