name: Deploy to Cloudflare Pages

# Auto-deploys eeshsaxena.com on every push to main (e.g. after adding a blog
# post via the GitHub web UI). Requires one repo secret: CLOUDFLARE_API_TOKEN
# (create it in the Cloudflare dashboard with the "Cloudflare Pages — Edit"
# template).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root (3D) dependencies
        run: npm install

      - name: Build 3D scene and assemble into the 2D project
        run: npm run build:unified

      - name: Install 2D site dependencies
        run: npm install
        working-directory: portfolio-master/portfolio-master

      - name: Build 2D site
        run: npm run build
        working-directory: portfolio-master/portfolio-master

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e8a7ae413cd1e9a8e12dd9e0ed12402a
          wranglerVersion: '4'
          workingDirectory: portfolio-master/portfolio-master
          command: pages deploy ./build/client --project-name eeshsaxena-portfolio-simple --branch main
